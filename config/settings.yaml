# Public configuration (safe to commit)
# Organized by source (folder) with nested pages.
# Each source has a label and shared settings that pages inherit.

http:
  user_agent: "OpenLibraryCrawler/0.1 (+https://github.com/<your-org>/<your-repo>)"
  timeout_seconds: 60
  max_retries: 3

crawlers:
  # ============================================================================
  # HKSAR - HKSAR Press Releases
  # ============================================================================
  hksar:
    label: "HKSAR Press Releases"
    base_url: "https://www.info.gov.hk"
    pages:
      hksar_press_releases:
        # HKSAR Government Press Releases daily listing crawler.
        # Iterates day-by-day for the last 2 years and extracts press release detail links
        # within div#contentBody.
        days_back: 730
        locales:
          - "en"
          - "tc"
        listing_path_template: "/gia/general/{yyyymm}/{dd}.htm"
        listing_path_template_tc: "/gia/general/{yyyymm}/{dd}c.htm"
        request_delay_seconds: 0.5
        request_jitter_seconds: 0.25
        per_day_limit: 200
        max_total_records: 50000
        backoff_base_seconds: 0.5
        backoff_jitter_seconds: 0.25

  # ============================================================================
  # LEGCO - Legislative Council
  # ============================================================================
  legco:
    label: "Legislative Council"
    base_url: "https://www.legco.gov.hk"
    request_delay_seconds: 0.5
    request_jitter_seconds: 0.25
    backoff_base_seconds: 0.5
    backoff_jitter_seconds: 0.25
    max_total_records: 50000
    pages:
      development_meetings:
        # LegCo Panel on Development meetings minutes and papers PDF crawler.
        panel_slug: "development"
        years_back: 5

      development_papers_reports:
        # LegCo Panel on Development papers-and-reports PDF crawler.
        panel_slug: "development"
        years_back: 5

      finance_meetings:
        # LegCo Finance Committee meetings minutes and papers PDF crawler.
        panel_slug: "finance"
        years_back: 5

      finance_papers_reports:
        # LegCo Finance Committee papers-and-reports PDF crawler.
        panel_slug: "finance"
        years_back: 5

      finance_financial_proposals_considered:
        # LegCo Finance Committee financial proposals considered PDF crawler.
        panel_slug: "finance"
        years_back: 5

      public_works_project_proposal_considered:
        # LegCo Public Works Subcommittee project proposals considered PWSC PDF crawler.
        committee_slug: "public-works"
        years_back: 5

      public_works_papers_reports:
        # LegCo Public Works Subcommittee papers-and-reports PDF crawler.
        committee_slug: "public-works"
        years_back: 5

  # ============================================================================
  # DEVB - The Development Bureau
  # ============================================================================
  devb:
    label: "The Development Bureau"
    base_url: "https://www.devb.gov.hk"
    request_delay_seconds: 0.5
    request_jitter_seconds: 0.25
    backoff_base_seconds: 0.5
    backoff_jitter_seconds: 0.25
    max_total_records: 50000
    pages:
      devb_press_releases:
        # DevB Press Releases (English) index crawler.
        years_back: 10
        type: "all"

      devb_speeches_and_presentations:
        # DevB Speeches and Presentations (English) index crawler.
        years_back: 10
        type: "all"

      devb_general_circulars:
        # DevB General Circulars (English) crawler.
        page_url: "https://www.devb.gov.hk/en/publications_and_press_releases/general_circulars/index.html"

      devb_planning_and_lands_technical_circulars:
        # DevB Planning and Lands Technical Circulars (English) crawler.
        page_url: "https://www.devb.gov.hk/en/publications_and_press_releases/technical_circulars/planning_and_lands_technical_circular/index.html"

      devb_works_technical_circulars_um:
        # DevB Works Technical Circulars (in force) via JS dataset.
        data_js_url: "https://www.devb.gov.hk/filemanager/technicalcirculars/list_technicalcirculars_53.js"
        years_back: 10
        include_revision_year_matches: true
        request_delay_seconds: 0.0
        request_jitter_seconds: 0.0

      devb_publications:
        # DevB Publications (English) recursive document crawler.
        seed_url: "https://www.devb.gov.hk/en/publications_and_press_releases/publications/index.html"
        scope_prefix: "/en/publications_and_press_releases/publications/"
        content_element_id: "content"
        exclude_path_prefixes:
          - "/en/publications_and_press_releases/publications/glossary_of_terms"
          - "/en/publications_and_press_releases/publications/standardised_components_and_practices"
        max_depth: 6
        max_pages: 2000
        max_out_links_per_page: 500

      devb_construction_site_safety_manual:
        # DevB Construction Site Safety Manual crawler.
        page_url: "https://www.devb.gov.hk/en/publications_and_press_releases/publications/construction_site_safety_manual/index.html"
        content_element_id: "content"

      devb_standard_consultancy_documents:
        # DevB Standard Consultancy Documents crawler.
        page_url: "https://www.devb.gov.hk/en/publications_and_press_releases/publications/standard_consultancy_documents/index.html"
        content_element_id: "content"

      devb_standard_contract_documents:
        # DevB Standard Contract Documents crawler.
        page_url: "https://www.devb.gov.hk/en/publications_and_press_releases/publications/standard_contract_documents/index.html"
        content_element_id: "content"

